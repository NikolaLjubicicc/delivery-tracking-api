spring.application.name=delivery-tracking

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/delivery}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:delivery_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Liquibase
spring.liquibase.enabled=${SPRING_LIQUIBASE_ENABLED:true}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Multipart (bulk import)
spring.servlet.multipart.max-file-size=${APP_IMPORT_MAX_FILE_SIZE_MB:10}MB
spring.servlet.multipart.max-request-size=${APP_IMPORT_MAX_FILE_SIZE_MB:10}MB

# Server
server.port=${SERVER_PORT:8081}
