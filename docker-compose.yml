services:
  db:
    image: postgres:16
    container_name: delivery-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-delivery_tracking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-delivery_tracking}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: delivery-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-delivery_tracking}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_LIQUIBASE_ENABLED: "true"
      SERVER_PORT: 8081
      APP_IMPORT_MAX_FILE_SIZE_MB: 10
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
